<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">

    <div class="dashboard-container">
        <h1>Welcome to Lecturer Dashboard</h1>
        <button id="logoutBtn">Logout</button>
    </div>

    <h2>Create Attendance</h2>
    <form id="attendanceForm">
        <input type="text" id="course" placeholder="Course Name">
        <input type="date" id="date">
        <button type="submit">Create Attendance</button>
    </form>

    <h2>Mark Attendance</h2>

    <label for="courseSelect">Select Session:</label>
    <select id="courseSelect">
        <option value="">-- Choose a course session --</option>
    </select>

    <div id="studentList"></div>

    <h2>Attendance Sessions</h2>
    <div id="attendanceList"></div>

    <script src="script.js"></script>

</body>
</html>
